name: kasampo_app
description: "散歩ルートとスポット写真を記録・共有するモバイルアプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.1.0
  firebase_app_check: ^0.3.1
  google_sign_in: ^6.2.1

  # 状態管理・ルーティング
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7

  # GPS・地図
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # 写真
  image_picker: ^1.1.2
  flutter_image_compress: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: FutehodoMaruGothic
      fonts:
        - asset: fonts/Futehodo-MaruGothic.ttf
